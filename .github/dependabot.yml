# Dependabot — grouped + daily: updates arrive as ONE grouped cargo PR and ONE
# grouped GitHub-Actions PR per day, and only when a member actually has an
# update (a grouped PR is opened solely when there is something to bump), so a
# quiet day is silent. Security advisories are NOT throttled by this cadence:
# Dependabot security updates (enabled repo-side) and the audit.yml workflow
# react to RustSec / GitHub advisories immediately.
#
# There is deliberately no `docker` ecosystem: the Dockerfile is `FROM scratch`
# (it ships the prebuilt release binary, no base image), so there is no image
# tag or digest for Dependabot to bump. The docker GitHub Actions used by
# docker.yml are covered by the github-actions ecosystem below.
version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: daily
    groups:
      cargo-dependencies:
        patterns: ["*"]
    labels: [dependencies]
    # master is squash-merged and the conventional gate (conventional.yml) lints
    # the PR title AND every commit, so Dependabot's default "Bump ..." subject is
    # rejected. Emit a Conventional Commit instead — `build(deps): bump ...` (cargo
    # deps are build inputs; the deps/deps-dev scope comes from include: scope).
    # `build` is a no-bump type, so a dependency PR never drives a release on its own.
    commit-message:
      prefix: build
      include: scope

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: daily
    groups:
      github-actions:
        patterns: ["*"]
    labels: [dependencies, ci]
    # Same reason as cargo above: produce `ci(deps): bump ...` so the squash subject
    # and the commit both pass the conventional gate. `ci` is a no-bump type too.
    commit-message:
      prefix: ci
      include: scope

  # The in-browser wasm crate (crates/bdinfo-rs-wasm) is an INDEPENDENT workspace
  # (its own Cargo.lock, `exclude`d from the root), so the `/` cargo entry above
  # never sees its deps — yet wasm-bindgen / js-sys / web-sys are compiled into the
  # shipped `.wasm`. Watch them here with the same `build(deps):` no-bump subject
  # (cargo deps are build inputs), so the squash subject + commit pass the gate.
  - package-ecosystem: cargo
    directory: "/crates/bdinfo-rs-wasm"
    schedule:
      interval: daily
    groups:
      wasm-cargo-dependencies:
        patterns: ["*"]
    labels: [dependencies]
    commit-message:
      prefix: build
      include: scope

  # The browser package's npm devDependencies (binaryen / typescript / biome /
  # playwright-core) — the toolchain that builds, lints, and parity-tests the
  # published @bdinfo-rs/wasm package. `build(deps):` (no-bump) keeps the squash
  # subject + every commit conventional, exactly like the cargo entries.
  - package-ecosystem: npm
    directory: "/crates/bdinfo-rs-wasm/web"
    schedule:
      interval: daily
    groups:
      wasm-web-dependencies:
        patterns: ["*"]
    labels: [dependencies]
    commit-message:
      prefix: build
      include: scope
