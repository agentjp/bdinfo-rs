name: dependency-review

# Blocks a PR that introduces a dependency with a known vulnerability or an
# incompatible license. Uses the GitHub dependency graph, which is free on public
# repositories (needs GitHub Advanced Security on private repos). This workflow
# assumes a public repo.

on:
  pull_request:

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5
        with:
          fail-on-severity: low
          comment-summary-in-pr: on-failure
