name: codeql

# CodeQL static analysis for Rust (build-mode: none — no compilation needed).
# Code scanning is free on public repositories; on a private repo it needs GitHub
# Advanced Security. This workflow assumes a public repo.

on:
  push:
    branches: [master]
  pull_request:
  schedule:
    # Daily 06:00 UTC — picks up new queries shipped in CodeQL releases.
    - cron: "0 6 * * *"

permissions:
  contents: read

jobs:
  analyze:
    name: analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        # rust: the crates; actions: the workflow files themselves.
        language: [rust, actions]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: ${{ matrix.language }}
          build-mode: none

      - uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: "/language:${{ matrix.language }}"
