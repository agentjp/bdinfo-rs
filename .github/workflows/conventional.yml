name: conventional

# Enforce Conventional Commits on every pull request. master is REBASE-merged, so
# each commit a PR adds is preserved on master verbatim — therefore every commit in
# the PR must be a valid conventional commit. `convco check` (reading the repo's
# .convco) is the PRIMARY gate. A second gate bans LLM/AI-attribution tokens from
# the commit messages AND the PR title/body, via the shared single-source script
# .github/scripts/check-banned-words.ps1 (the same script the local commit-msg hook
# runs). Linting the PR title as a conventional commit is advisory only (under
# rebase-merge the title is cosmetic and never lands on master).
#
# convco is a calculator/linter: it never commits, tags, or pushes. The version
# bump + changelog (see CONTRIBUTING.md) stay manual, and only a pushed vX.Y.Z tag
# triggers a release (cargo-dist) — merging a PR never does.

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read

concurrency:
  group: conventional-${{ github.ref }}
  cancel-in-progress: true

jobs:
  conventional:
    name: conventional commits + banned words
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0   # need base..head history to walk the PR's commits
          persist-credentials: false

      - name: Install convco (prebuilt, no from-source compile)
        uses: taiki-e/install-action@9e1e5806d4a4822de933115878265be9aaa786d9 # v2.82.2
        with:
          tool: convco@0.6.4

      # Prove the banned-word regex still rejects attribution and passes innocent
      # prose, so the policy script can never silently rot.
      - name: Banned-word regex self-test
        shell: pwsh
        run: ./.github/scripts/check-banned-words.ps1 -SelfTest

      # PRIMARY gate: every commit the PR adds must be conventional. --ignore-reverts
      # skips `git revert`'s non-conventional "Revert ..." subjects. The SHAs come
      # from the trusted GitHub context but are routed through env anyway (zizmor
      # template-injection hygiene), as the PR title/body below require.
      - name: Conventional commits (convco check)
        shell: pwsh
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          $range = "$env:BASE_SHA..$env:HEAD_SHA"
          Write-Host "checking $range"
          convco check --ignore-reverts $range
          if ($LASTEXITCODE -ne 0) {
            Write-Host '::error::A commit on this PR is not a valid conventional commit. See CONTRIBUTING.md.'
            exit 1
          }

      # SECONDARY gate: no LLM/AI-attribution tokens in commit messages OR PR
      # title/body. PR title/body are attacker-controllable, so they go through env
      # and are never interpolated into the run block.
      - name: Banned words (commits + PR title/body)
        shell: pwsh
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          # Invoke the checker as a CHILD process (pwsh -File): the script calls
          # `exit`, which would otherwise terminate this whole step in-process.
          $script = './.github/scripts/check-banned-words.ps1'
          $bad = $false
          foreach ($sha in @(git log --format=%H "$env:BASE_SHA..$env:HEAD_SHA")) {
            $msg = (git log -1 --format=%B $sha | Out-String)
            pwsh -NoProfile -File $script -Text $msg -Label "commit $($sha.Substring(0, 8))"
            if ($LASTEXITCODE -ne 0) { $bad = $true }
          }
          pwsh -NoProfile -File $script -Text "$env:PR_TITLE" -Label 'PR title'
          if ($LASTEXITCODE -ne 0) { $bad = $true }
          pwsh -NoProfile -File $script -Text "$env:PR_BODY" -Label 'PR body'
          if ($LASTEXITCODE -ne 0) { $bad = $true }
          if ($bad) { exit 1 }
          Write-Host 'no banned LLM/AI-attribution tokens found.'

      # ADVISORY: lint the PR title as a conventional commit. It does not gate the
      # merge (the title is cosmetic under rebase-merge), but a malformed title is
      # surfaced as a warning so the PR list stays tidy.
      - name: PR title conventional (advisory)
        shell: pwsh
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          "$env:PR_TITLE" | convco check --from-stdin
          if ($LASTEXITCODE -ne 0) {
            Write-Host "::warning::PR title is not a conventional commit: $env:PR_TITLE"
          }
