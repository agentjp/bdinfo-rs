name: scorecard

# OpenSSF Scorecard — automated supply-chain / security-posture scoring
# (branch protection, signed releases, pinned dependencies, token permissions,
# …). Publishing the results feeds the public Scorecard badge and uploads a
# SARIF report into code scanning. Free on public repositories.

on:
  # Re-score when branch protection changes (Scorecard reads those settings).
  branch_protection_rule:
  schedule:
    - cron: "0 6 * * 2"   # Tuesdays 06:00 UTC
  push:
    branches: [master]

# Least privilege at the top; the analysis job widens only what it needs.
permissions:
  contents: read

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # upload the SARIF to code scanning
      id-token: write          # publish results to the OpenSSF API
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Run Scorecard analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          sarif_file: results.sarif
