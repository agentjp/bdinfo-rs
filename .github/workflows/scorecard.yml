name: scorecard

# OpenSSF Scorecard — automated supply-chain / security-posture scoring
# (branch protection, signed releases, pinned dependencies, token permissions,
# …). Publishing the results feeds the public Scorecard badge and uploads a
# SARIF report into code scanning. Free on public repositories.

on:
  # Re-score when branch protection changes (Scorecard reads those settings).
  branch_protection_rule:
  schedule:
    - cron: "0 6 * * 2"   # Tuesdays 06:00 UTC
  push:
    branches: [master]

# Least privilege at the top; the analysis job widens only what it needs.
permissions:
  contents: read

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # upload the SARIF to code scanning
      id-token: write          # publish results to the OpenSSF API
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Run Scorecard analysis
        uses: ossf/scorecard-action@v2
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
