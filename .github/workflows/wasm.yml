name: wasm

# The PROPORTIONATE gate for the in-browser package (crates/bdinfo-rs-wasm +
# web/), mirrored locally by scripts/wasm-compliance.ps1. NOT the core's
# 100%-cov / 0-mutant bar (the parser core carries that, unchanged) — here the
# bar is: it formats, lints clean (calibrated set, -D warnings), builds for
# wasm32, the wasm-opt'd payload stays under the committed size budget, the TS is
# type-clean + biome-clean, and the FULL measured scan renders BYTE-IDENTICAL to
# the same golden the native CLI e2e test pins — proven in Node and in real
# headless browsers (Chrome + Firefox via wasm-bindgen-test).
#
# This file is the GATE only (push to a branch + PRs) — deliberately NOT triggered
# on tags, so its build caches are never a publishing-time cache-poisoning vector.
# The tag-driven npm publish lives beside publish-crates.yml in publish-npm.yml.

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: wasm-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  NIGHTLY: nightly-2026-06-05 # keep in lockstep with scripts/_common.ps1 + ci.yml
  NODE_VERSION: "22.14.0"     # Node >= 22.14

jobs:
  gate:
    name: wasm gate (build + size + parity)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install pinned nightly rustfmt
        run: rustup toolchain install ${{ env.NIGHTLY }} --profile minimal --component rustfmt

      - name: Add the wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: crates/bdinfo-rs-wasm

      - name: Install wasm-bindgen-cli (pinned to the crate version)
        uses: taiki-e/install-action@bffeee26d4db9be238a4ea78d8826604ebcb594d # v2.82.5
        with:
          tool: wasm-bindgen-cli@0.2.126

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install the web toolchain (binaryen / biome / typescript / playwright-core)
        working-directory: crates/bdinfo-rs-wasm/web
        run: npm ci

      - name: Format (nightly rustfmt)
        working-directory: crates/bdinfo-rs-wasm
        run: cargo +${{ env.NIGHTLY }} fmt --check

      - name: Clippy (calibrated, -D warnings)
        working-directory: crates/bdinfo-rs-wasm
        run: cargo clippy --target wasm32-unknown-unknown --all-targets --release -- -D warnings

      - name: Build (wasm32, release)
        working-directory: crates/bdinfo-rs-wasm
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Build the browser artifact (wasm-bindgen + wasm-opt -Oz + tsc)
        working-directory: crates/bdinfo-rs-wasm/web
        run: npm run build

      - name: Size budget (optimized .wasm)
        working-directory: crates/bdinfo-rs-wasm/web
        run: npm run --silent size

      - name: biome check
        working-directory: crates/bdinfo-rs-wasm/web
        run: npm run --silent check

      - name: tsc --noEmit
        working-directory: crates/bdinfo-rs-wasm/web
        run: npm run --silent typecheck

      - name: Node golden-parity (scan_files == golden, byte-exact)
        working-directory: crates/bdinfo-rs-wasm/web
        run: npm run --silent test:node

      # Real-browser execution: the SAME measured-scan parity test (tests/parity.rs)
      # run headless via wasm-bindgen-test. The runner picks the browser from the
      # driver env var set for that step (geckodriver / chromedriver are preinstalled
      # on ubuntu-latest; CHROMEWEBDRIVER / GECKOWEBDRIVER point at their dirs).
      - name: wasm-bindgen-test (Firefox)
        working-directory: crates/bdinfo-rs-wasm
        env:
          CARGO_TARGET_WASM32_UNKNOWN_UNKNOWN_RUNNER: wasm-bindgen-test-runner
          GECKODRIVER: ${{ env.GECKOWEBDRIVER }}/geckodriver
        run: cargo test --target wasm32-unknown-unknown --release --test parity

      - name: wasm-bindgen-test (Chrome)
        working-directory: crates/bdinfo-rs-wasm
        env:
          CARGO_TARGET_WASM32_UNKNOWN_UNKNOWN_RUNNER: wasm-bindgen-test-runner
          CHROMEDRIVER: ${{ env.CHROMEWEBDRIVER }}/chromedriver
        run: cargo test --target wasm32-unknown-unknown --release --test parity
