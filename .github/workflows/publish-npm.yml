name: publish-npm

# STAGE-publish @bdinfo-rs/wasm (the in-browser package, crates/bdinfo-rs-wasm/web)
# to npm on a vX.Y.Z tag, using npm OIDC Trusted Publishing: a short-lived,
# repo/workflow-scoped token is minted at run time, so NO long-lived npm token is
# stored. The npm analog of publish-crates.yml; SEPARATE from cargo-dist.
#
# Runs ONLY on v* tags — never on a PR or a branch push. Builds the artifact fresh
# (no build cache) so the --provenance attestation covers exactly what is shipped.
# CI only STAGES the package; it is not installable until a maintainer approves it
# with `npm stage approve` (2FA — OIDC cannot approve), so a compromised CI run can
# never ship a live version. Approve after pushing the tag — see the job summary.
#
# One-time human bootstrap (cannot be automated):
#   1. Reserve the npm name: publish @bdinfo-rs/wasm once by hand (or create the
#      @bdinfo-rs org/scope) so the package exists.
#   2. On npmjs.com -> the package -> Settings -> Trusted Publisher -> GitHub
#      Actions: repository `agentjp/bdinfo-rs`, workflow `publish-npm.yml`.
#      Thereafter every v* tag STAGES a provenance-signed release with NO stored
#      token, awaiting a maintainer's `npm stage approve` (2FA) to go live. For the
#      strongest posture, grant the trusted publisher ONLY `npm stage publish` (not
#      `npm publish`), so CI can never do a direct live publish.

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

concurrency:
  group: publish-npm-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Refuse to publish a tag that is not on master — the same ancestry gate
  # release.yml uses, via the same reusable workflow. A vX.Y.Z tag pushed onto a
  # side branch (so it never passed the gate) cannot ship to npm: the publish job
  # `needs:` this one.
  guard-ancestor:
    uses: ./.github/workflows/guard-ancestor.yml
    # No `secrets: inherit` — guard-ancestor takes no secrets (checkout + a
    # `git merge-base` ancestry check), so inheriting them is needless privilege
    # (and zizmor's secrets-inherit audit flags it). release.yml's generated copy
    # carries `secrets: inherit`, but this hand-maintained workflow is hardened in
    # place rather than suppressed.
    permissions:
      contents: read

  publish:
    name: npm publish (OIDC Trusted Publishing)
    needs: guard-ancestor
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # mint the short-lived npm OIDC token (no stored token)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install pinned nightly rustfmt
        run: rustup toolchain install nightly-2026-06-05 --profile minimal --component rustfmt

      - name: Add the wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Install wasm-bindgen-cli (pinned to the crate version)
        uses: taiki-e/install-action@16b05812d776ae1dfaabc8277e421fb6d2506419 # v2.82.7
        with:
          tool: wasm-bindgen-cli@0.2.126

      # zizmor flags setup-node in this tag-triggered (publishing) workflow as a
      # cache-poisoning vector, but no `cache:` input is set, so it neither restores
      # nor saves any cache — there is nothing to poison. setup-node is required to
      # get a modern Node/npm for OIDC, and the tag trigger is intrinsic to a
      # publish workflow, so this is an unavoidable false positive (cf. the inline
      # ref-version-mismatch ignore documented in .github/zizmor.yml).
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0 # zizmor: ignore[cache-poisoning]
        with:
          # The active Node line (26 -> LTS Oct 2026); kept in lockstep with
          # wasm.yml + deploy-pages.yml (version-freshness.yml cross-checks the three).
          node-version: "26.4.0"

      # Staged publishing (`npm stage publish`) needs npm >= 11.15.0. Node 26.4.0
      # already bundles an npm >= the floor, so this is not strictly required
      # today — but pin npm explicitly anyway, so the publish runs on a
      # deterministic, version-freshness-watched npm independent of which npm a
      # given Node 26.x patch happens to bundle (the repo's pin-everything posture).
      # The published wasm bytes are fixed by the pinned rustc / wasm-bindgen /
      # binaryen, independent of npm. zizmor's adhoc-packages audit flags any
      # runtime install; pinning npm (from the official registry) carries a scoped
      # inline ignore. Keep this pin in lockstep with version-freshness.yml.
      - name: Pin npm to a staged-publishing-capable version
        run: npm install -g npm@11.18.0 # zizmor: ignore[adhoc-packages]

      - name: Verify Node >= 26 and npm >= 11.15.0
        shell: pwsh
        run: |
          $node = (& node --version).TrimStart('v')
          $npm = (& npm --version)
          Write-Host "node $node / npm $npm"
          if ([version]$node -lt [version]'26.0.0') { throw "Node $node is below the 26 floor" }
          if ([version]$npm -lt [version]'11.15.0') { throw "npm $npm is below the 11.15.0 staged-publishing floor" }

      # npm publishes whatever version is in package.json, not the tag — fail fast
      # if a tag was cut that does not match the workspace + package versions
      # (mirrors the guard in publish-crates.yml).
      - name: Verify the tag matches the workspace + package versions
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME
          if ($tag -notmatch '^v(?<base>\d+\.\d+\.\d+)(?:-[0-9A-Za-z][0-9A-Za-z.-]*)?$') {
            throw "Tag '$tag' is not vMAJOR.MINOR.PATCH[-prerelease]"
          }
          $base = $Matches['base']
          $inWp = $false; $ws = $null
          foreach ($line in (Get-Content Cargo.toml)) {
            if ($line -match '^\[workspace\.package\]') { $inWp = $true; continue }
            if ($line -match '^\[') { $inWp = $false; continue }
            if ($inWp -and $line -match '^version\s*=\s*"([^"]+)"') { $ws = $Matches[1]; break }
          }
          if (-not $ws) { throw 'No [workspace.package] version found in Cargo.toml' }
          if ($base -ne $ws) { throw "Tag $tag (base $base) does not match workspace version $ws" }
          $pkg = (Get-Content crates/bdinfo-rs-wasm/web/package.json -Raw | ConvertFrom-Json).version
          if ($base -ne $pkg) { throw "Tag $tag (base $base) does not match web/package.json version $pkg" }
          # The wasm crate is an excluded workspace with a literal [package] version
          # (not version.workspace), so guard it too — `cargo set-version --workspace`
          # does not reach it and a drifted literal would otherwise ship unnoticed.
          $inPkg = $false; $wasm = $null
          foreach ($line in (Get-Content crates/bdinfo-rs-wasm/Cargo.toml)) {
            if ($line -match '^\[package\]') { $inPkg = $true; continue }
            if ($line -match '^\[') { $inPkg = $false; continue }
            if ($inPkg -and $line -match '^version\s*=\s*"([^"]+)"') { $wasm = $Matches[1]; break }
          }
          if (-not $wasm) { throw 'No [package] version in crates/bdinfo-rs-wasm/Cargo.toml' }
          if ($base -ne $wasm) { throw "Tag $tag (base $base) does not match wasm crate version $wasm" }

      - name: Install the web toolchain
        working-directory: crates/bdinfo-rs-wasm/web
        run: npm ci

      - name: Build the browser artifact (wasm-bindgen + wasm-opt -Oz + tsc)
        working-directory: crates/bdinfo-rs-wasm/web
        run: npm run build

      # Verify the freshly-built artifact before it ships: the wasm-opt'd payload
      # stays under the committed size budget, and the measured scan still renders
      # byte-identical to the golden (the same two checks the gate runs). A
      # regression in either blocks the publish.
      - name: Size budget (optimized .wasm)
        working-directory: crates/bdinfo-rs-wasm/web
        run: npm run --silent size

      - name: Node golden-parity (scan_files == golden, byte-exact)
        working-directory: crates/bdinfo-rs-wasm/web
        run: npm run --silent test:node

      # STAGED publish: CI only stages the tarball (OIDC supports `npm stage
      # publish`); it is NOT installable until a maintainer reviews and approves it
      # with `npm stage approve` (2FA, proof-of-presence — OIDC cannot approve). So
      # even a fully compromised CI run can produce only a staged package, never a
      # live one, and the real artifact is inspectable before it ships.
      - name: Stage publish @bdinfo-rs/wasm (provenance; prerelease -> dist-tag next)
        working-directory: crates/bdinfo-rs-wasm/web
        shell: pwsh
        run: |
          # A prerelease tag (vX.Y.Z-rc.1 — carries a `-` suffix) must NOT take the
          # `latest` dist-tag that a bare `npm install @bdinfo-rs/wasm` resolves;
          # ship it under `next` instead. Stable vX.Y.Z tags stage under `latest`.
          # The dist-tag is immutable on a staged package (reject + re-stage to change).
          $tag = $env:GITHUB_REF_NAME
          $distTag = if ($tag -match '-') { 'next' } else { 'latest' }
          Write-Host "staging $tag to npm dist-tag '$distTag'"
          npm stage publish --provenance --access public --tag $distTag
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      # The staged version is NOT live yet — the maintainer must approve it (2FA).
      # Surface the exact commands in the run's job summary + log.
      - name: Remind to approve the staged release
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME
          Write-Host "Staged $tag with provenance. It is NOT live until approved (2FA):"
          Write-Host "  npm stage view @bdinfo-rs/wasm"
          Write-Host "  npm stage download @bdinfo-rs/wasm"
          Write-Host "  npm stage approve @bdinfo-rs/wasm     (or npm stage reject)"
          Write-Host "Or approve at npmjs.com -> the package -> Staged."
          if ($env:GITHUB_STEP_SUMMARY) {
            "@bdinfo-rs/wasm $tag is STAGED (not live). Approve with: npm stage approve @bdinfo-rs/wasm (2FA), or on npmjs.com." | Add-Content -Path $env:GITHUB_STEP_SUMMARY
          }
