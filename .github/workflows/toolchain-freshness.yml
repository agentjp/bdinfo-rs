name: toolchain-freshness

# The toolchains are pinned (rust-toolchain.toml stable + the NIGHTLY env in
# ci.yml), which is right for reproducibility but rots silently. This weekly
# ~1-minute job compares the stable pin to the latest Rust release and checks the
# nightly pin's age; when either is stale it opens (or refreshes) one tracking
# issue. The bump itself stays a deliberate, human-reviewed change.

on:
  schedule:
    - cron: "0 6 * * 1"   # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    name: compare pinned toolchains to current
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Check the pins, file an issue if stale
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Pinned stable from rust-toolchain.toml.
          $stablePin = $null
          foreach ($line in (Get-Content rust-toolchain.toml)) {
            if ($line -match '^channel\s*=\s*"([0-9.]+)"') { $stablePin = $Matches[1]; break }
          }
          if (-not $stablePin) { throw 'No pinned stable channel in rust-toolchain.toml' }

          # Pinned nightly from ci.yml's NIGHTLY env.
          $nightlyPin = $null
          foreach ($line in (Get-Content .github/workflows/ci.yml)) {
            if ($line -match 'NIGHTLY:\s*nightly-(\d{4}-\d{2}-\d{2})') { $nightlyPin = $Matches[1]; break }
          }
          if (-not $nightlyPin) { throw 'No NIGHTLY pin in ci.yml' }

          # Latest stable Rust (release tag on rust-lang/rust).
          $latest = gh api repos/rust-lang/rust/releases/latest --jq '.tag_name'
          if ($LASTEXITCODE -ne 0) { throw 'Could not query the latest Rust release' }

          $nightlyAgeDays = [int]((Get-Date) - [datetime]::ParseExact($nightlyPin, 'yyyy-MM-dd', $null)).TotalDays
          $stableStale = [version]$latest -gt [version]$stablePin
          $nightlyStale = $nightlyAgeDays -gt 90

          Write-Host "stable pin: $stablePin (latest: $latest)  nightly pin: $nightlyPin ($nightlyAgeDays days old)"
          if (-not ($stableStale -or $nightlyStale)) { Write-Host 'Pins are fresh.'; exit 0 }

          $title = 'Toolchain pins are stale'
          $body = @(
            'The weekly toolchain-freshness check found:'
            ''
            $(if ($stableStale) { "- stable pin ``$stablePin`` in rust-toolchain.toml is behind the latest release ``$latest``" })
            $(if ($nightlyStale) { "- nightly pin ``nightly-$nightlyPin`` (ci.yml NIGHTLY + scripts/_common.ps1) is $nightlyAgeDays days old" })
            ''
            'Bump deliberately: update the pin(s), run the full local gate (`pwsh scripts/compliance.ps1 -Full`), and keep ci.yml''s NIGHTLY in lockstep with _common.ps1.'
          ) -ne $null -join "`n"

          $existing = gh issue list --state open --search 'Toolchain pins are stale in:title' --json number --jq '.[0].number'
          if ($existing) {
            gh issue edit $existing --body $body
            Write-Host "Updated existing issue #$existing"
          }
          else {
            gh issue create --title $title --body $body
          }
