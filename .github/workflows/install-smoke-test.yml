name: install-smoke-test

# Smoke test of the PUBLISHED Homebrew formula (macOS + Linuxbrew): it `brew install`s
# from the tap and asserts the binary runs AND the man page + bash/zsh/fish completions
# land in Homebrew's standard locations.
#
# Runs AUTOMATICALLY after every release — cargo-dist publishes the formula during
# release.yml, so by the time that workflow completes the tap has the new version —
# PLUS daily to catch Homebrew/macOS ecosystem drift between releases, PLUS on demand.
#
# Out of scope by design: Scoop, WinGet, and cargo install/binstall ship the bare
# executable only (no man/completions), so there is nothing to verify there. The
# .deb/.rpm/Cloudsmith man+completions contract is verified per-release in packages.yml.

on:  # zizmor: ignore[dangerous-triggers] only installs the published formula; never checks out untrusted PR code
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  schedule:
    - cron: "0 7 * * *" # daily 07:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  homebrew:
    name: Homebrew (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # When chained off release.yml, only run if the release actually succeeded
    # (nothing new is published otherwise). Schedule/manual runs always proceed.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15, ubuntu-latest]
    steps:
      # Homebrew/actions publishes NO version tags, so this pin cannot carry an
      # immutable `# vX.Y.Z` like every other action in the repo. The SHA is a
      # deliberate FREEZE of a reviewed master commit — never "track latest". We
      # therefore exempt only this line from zizmor's ref-version-mismatch, which
      # would otherwise resolve a `# master` comment against the live branch HEAD and
      # red-X every PR each time Homebrew pushes to master. It stays SHA-pinned, so
      # Scorecard pinned-dependencies and zizmor's unpinned-uses are still satisfied.
      # Staying current is out-of-band, not a blocking check: version-freshness.yml
      # nags (files an issue) when Homebrew master moves past this SHA, and the bump
      # is then a deliberate edit here. Dependabot cannot do it (it bumps toward
      # releases, and this repo has none).
      - uses: Homebrew/actions/setup-homebrew@841d750a0ed9262d3c3ca31f2173974696bc261a # zizmor: ignore[ref-version-mismatch]

      # The macOS runner image ships aws/tap + azure/bicep pre-tapped; Homebrew's tap-trust
      # check then warns about them on every brew command. We install bdinfo-rs by its
      # fully-qualified name (which trusts only that item), so those taps are unrelated noise
      # — trust them to silence it. Scoped to the two named taps ON PURPOSE: if the image
      # later pre-taps a new one we WANT that warning, so we never blanket-disable the
      # feature. Tolerant: those taps don't exist on the Linux runner. (The lone remaining
      # "Sandbox unavailable" warning on Linux is left deliberately — it's an honest signal
      # that self-resolves when the runner gains a usable sandbox; HOMEBREW_NO_SANDBOX_LINUX
      # would force-disable it forever and hide that, for a binary formula with nothing to
      # sandbox.)
      - name: Trust the runner's pre-tapped third-party taps
        shell: bash
        run: for tap in aws/tap azure/bicep; do brew trust "$tap" 2>/dev/null || true; done

      - name: Install bdinfo-rs from the tap
        run: brew install agentjp/tap/bdinfo-rs

      - name: Verify the binary runs and man + completions are installed
        shell: bash
        run: |
          bdinfo-rs --version
          prefix="$(brew --prefix)"
          test -f "$prefix/share/man/man1/bdinfo-rs.1" || { echo "missing man page"; exit 1; }
          { test -f "$prefix/etc/bash_completion.d/bdinfo-rs" || test -f "$prefix/share/bash-completion/completions/bdinfo-rs"; } || { echo "missing bash completion"; exit 1; }
          test -f "$prefix/share/zsh/site-functions/_bdinfo-rs" || { echo "missing zsh completion"; exit 1; }
          test -f "$prefix/share/fish/vendor_completions.d/bdinfo-rs.fish" || { echo "missing fish completion"; exit 1; }
          echo "Homebrew install OK: binary + man + completions present"
