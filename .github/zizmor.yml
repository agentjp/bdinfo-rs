# zizmor configuration — read by the `zizmor.yml` workflow and the local gate
# (scripts/compliance.ps1). Every audit runs at full strength; the only
# suppressions are findings in release.yml, which is GENERATED by cargo-dist from
# dist-workspace.toml and must pass `dist generate --check` unmodified — so an
# inline `# zizmor: ignore[...]` there would be wiped on the next regeneration.
# Each is an accepted, structural residual of cargo-dist's own template, scoped to
# release.yml by rule id (whole-file, since regeneration shifts line numbers).
# Findings in every hand-maintained workflow are fixed in place, not ignored.
#
# ref-version-mismatch is intentionally NOT suppressed: every SHA pin carries the
# EXACT immutable tag it resolves to (`# vX.Y.Z`, not a moving major `# vN`), so a
# pin's comment can never drift from its hash and Dependabot bumps both together.
rules:
  # cargo-dist hardcodes a top-level `contents: write` (needed to upload release
  # assets); it is not tightenable without editing the generated file.
  excessive-permissions:
    ignore:
      - release.yml
  # dist calls the reusable guard-ancestor workflow with `secrets: inherit`; the
  # guard itself only reads, and the call site is part of dist's template.
  secrets-inherit:
    ignore:
      - release.yml
  # The build matrix's optional `container:` expands from dist's own config, not
  # from attacker input; dist emits it unpinned.
  unpinned-images:
    ignore:
      - release.yml
  # dist interpolates its own plan outputs (e.g. needs.plan.outputs.tag-flag) into
  # run blocks; these come from dist's trusted plan step, and the file cannot be
  # hand-edited to route them through env.
  template-injection:
    ignore:
      - release.yml
