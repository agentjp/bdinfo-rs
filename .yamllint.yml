# ryl (a Rust yamllint) config — enforced by the `yaml` job in ci.yml and the
# local gate (scripts/compliance.ps1). Starts from yamllint's `default` ruleset,
# then relaxes only the five rules that fight this repo's deliberate, consistent
# YAML style (and the dist-GENERATED release.yml, which must pass unmodified
# because `dist generate --check` forbids hand-edits). Every other default rule
# stays on: duplicate keys, trailing whitespace, missing final newline, bad
# indentation, empty values, octal surprises, etc.
extends: default

rules:
  # YAML line length is not a correctness signal. release.yml is generated by
  # cargo-dist with 300+ char lines and cannot be reformatted; our own comments
  # are intentionally long. Don't gate on it.
  line-length: disable
  # The repo deliberately omits the `---` document-start marker everywhere.
  document-start: disable
  # SHA-pinned `uses:` lines carry a one-space `# vN` tag by convention
  # (`uses: actions/checkout@<sha> # v7`); the default wants two.
  comments:
    min-spaces-from-content: 1
  # Matrix includes use one-space flow mappings: `{ triple: ..., os: ... }`.
  braces:
    max-spaces-inside: 1
  # GitHub Actions' `on:` trigger key is parsed as a YAML boolean; don't flag
  # workflow keys as truthy. Value-level truthy checks (a stray `foo: yes`)
  # stay on.
  truthy:
    check-keys: false
